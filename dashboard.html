<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#080b12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>APEX激やばツール ・ 解析ダッシュ v2</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b12;--panel:#111827;--panel2:#0c1220;--line:#1d2740;--cy:#19e3ff;--mg:#ff3df2;--text:#eaf2ff;--sub:#7e8db0;--ok:#22e3a0;--warn:#ffc23d;--down:#ff3d5e;--disp:'Chakra Petch',sans-serif;--jp:'Zen Kaku Gothic New',sans-serif;--fs:1;--pad:14px;--glow:1}
html.light{--bg:#eef2f8;--panel:#ffffff;--panel2:#f4f7fc;--line:#d4dbe8;--cy:#0077b6;--mg:#c2187a;--text:#15233c;--sub:#5d6b85;--ok:#0d8f63;--warn:#a87900;--down:#cc2244}
html.cbl{--cy:#3da5ff;--mg:#ff9d2e;--ok:#3da5ff;--down:#ff9d2e}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--jp);font-size:calc(14px*var(--fs));padding:14px 12px calc(86px + env(safe-area-inset-bottom));max-width:1040px;margin:0 auto;transition:background .3s}
html:not(.light) body{background:radial-gradient(120% 80% at 50% 0%,#0d1424,#05070d 70%)}
html.compact{--pad:9px}
html.compact .sec{margin-bottom:9px}
h1{font-family:var(--disp);font-weight:700;font-size:19px;letter-spacing:.03em;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
h1 b{color:var(--cy)}
.hdr{position:sticky;top:0;z-index:50;background:var(--bg);padding:8px 0;display:flex;justify-content:space-between;align-items:center;gap:8px;transition:padding .2s}
.hdr.mini{padding:3px 0}
.hdr .hsub{font-size:11px;color:var(--sub)}
.toprow{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.chip{background:var(--panel2);border:1px solid var(--line);color:var(--sub);border-radius:999px;padding:6px 11px;font-size:11.5px;cursor:pointer;min-height:32px}
.chip.on{border-color:var(--cy);color:var(--cy)}
.chip:active{transform:scale(.96)}
.sec{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:var(--pad);margin-bottom:13px;animation:fin .35s ease}
html.nomotion .sec{animation:none}
@keyframes fin{from{opacity:0;transform:translateY(7px)}to{opacity:1}}
.sec h2{font-family:var(--disp);font-size:12.5px;color:var(--cy);letter-spacing:.06em;margin-bottom:11px;text-transform:uppercase;display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.sec h2 .bdg{background:var(--panel2);border:1px solid var(--line);border-radius:999px;font-size:10px;color:var(--sub);padding:1px 8px}
.sec h2 .arr{margin-left:auto;color:var(--sub);transition:transform .2s}
.sec.closed .arr{transform:rotate(-90deg)}
.sec.closed .body{display:none}
.sec .note{font-size:11px;color:var(--sub);line-height:1.7;margin-top:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
html.cols1 .grid2{grid-template-columns:1fr}
@media(max-width:640px){.grid2{grid-template-columns:1fr}}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
.kpi{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:11px 12px;position:relative;cursor:pointer;min-height:44px}
.kpi .l{font-size:11px;color:var(--sub);margin-bottom:4px;display:flex;gap:5px;align-items:center}
.kpi .v{font-family:var(--disp);font-weight:700;font-size:24px;font-variant-numeric:tabular-nums;display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
.kpi .u{font-size:11px;color:var(--sub);font-weight:500}
.kpi .d{font-size:11px;font-family:var(--disp);font-weight:700}
.kpi .d.up{color:var(--ok)}.kpi .d.dn{color:var(--down)}.kpi .d.fl{color:var(--sub)}
.kpi .spark{position:absolute;right:9px;bottom:7px;opacity:.85}
.kpi .crown{position:absolute;top:7px;right:9px;font-size:13px}
.kpi .sub2{font-size:10px;color:var(--sub);margin-top:4px;line-height:1.5}
.kpi .rng{height:4px;border-radius:2px;background:var(--line);margin-top:7px;position:relative}
.kpi .rng i{position:absolute;top:-2px;width:8px;height:8px;border-radius:50%;background:var(--cy);transform:translateX(-50%)}
.kpi.pin{outline:1.5px solid var(--cy)}
.bars{display:flex;flex-direction:column;gap:6px}
.bar{display:grid;grid-template-columns:148px 1fr 52px;align-items:center;gap:8px;min-height:24px}
.bar .bl{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;gap:5px;align-items:center}
.bar .bl .rkch{font-size:9px;font-family:var(--disp)}
.rkch.up{color:var(--ok)}.rkch.dn{color:var(--down)}.rkch.new{color:var(--warn)}
.bar .bt{height:13px;border-radius:7px;background:var(--panel2);border:1px solid var(--line);overflow:hidden}
.bar .bt i{display:block;height:100%;background:linear-gradient(90deg,var(--cy),var(--mg));transition:width .5s ease}
html.nomotion .bar .bt i{transition:none}
.bar .bv{font-family:var(--disp);font-size:12px;color:var(--sub);text-align:right;font-variant-numeric:tabular-nums;cursor:pointer}
.bar:nth-child(even){background:rgba(125,141,176,.05);border-radius:7px}
.tbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:11px}
.tbar input,.tbar select{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:7px 10px;font-size:12px;font-family:inherit;min-height:32px}
svg text{font-family:var(--disp)}
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--panel);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
.tabbar button{flex:1;max-width:130px;background:none;border:none;color:var(--sub);font-family:var(--jp);font-size:10.5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;min-height:44px;border-radius:10px}
.tabbar button .ic{font-size:19px}
.tabbar button.on{color:var(--cy);background:rgba(25,227,255,.07)}
.pane{display:none}.pane.on{display:block}
.alertbar{border-radius:12px;padding:11px 13px;margin-bottom:12px;font-size:13px;line-height:1.6;border:1px solid}
.alertbar.fire{border-color:var(--warn);background:rgba(255,194,61,.08)}
.alertbar.bad{border-color:var(--down);background:rgba(255,61,94,.08)}
.alertbar.ok{border-color:var(--ok);background:rgba(34,227,160,.07)}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.btn{background:var(--panel2);border:1px solid var(--cy);color:var(--cy);border-radius:9px;padding:9px 14px;font-weight:700;cursor:pointer;font-size:12.5px;min-height:38px}
.btn.gray{border-color:var(--line);color:var(--sub)}
.btn.red{border-color:var(--down);color:var(--down)}
.btn:active{transform:scale(.97)}
.field{margin-bottom:10px}
.field label{display:block;font-size:11.5px;color:var(--sub);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:9px 11px;font-size:13px;font-family:inherit}
.swrow{display:flex;justify-content:space-between;align-items:center;padding:9px 2px;border-top:1px solid var(--line);font-size:13px;min-height:44px;gap:10px}
.swrow:first-child{border-top:none}
.sw{position:relative;width:44px;height:24px;border-radius:12px;background:var(--line);cursor:pointer;flex:none;transition:background .2s}
.sw.on{background:var(--cy)}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s}
.sw.on::after{left:22px}
.tip{position:fixed;z-index:99;background:var(--panel);border:1px solid var(--cy);color:var(--text);border-radius:10px;padding:9px 12px;font-size:12px;max-width:270px;line-height:1.6;box-shadow:0 6px 24px rgba(0,0,0,.4);pointer-events:none}
.skel{height:86px;border-radius:12px;background:linear-gradient(90deg,var(--panel2) 25%,var(--line) 50%,var(--panel2) 75%);background-size:200% 100%;animation:sk 1.2s infinite}
@keyframes sk{to{background-position:-200% 0}}
.flash{animation:fl2 1s ease}
@keyframes fl2{0%{background:rgba(25,227,255,.25)}100%{background:transparent}}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--panel);border:1px solid var(--cy);color:var(--text);border-radius:999px;padding:9px 18px;font-size:12.5px;z-index:99;box-shadow:0 6px 20px rgba(0,0,0,.4)}
.mask .num,.mask .kpi .v,.mask .bar .bv{filter:blur(7px)}
.toc{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.totop{position:fixed;right:14px;bottom:96px;z-index:55;width:42px;height:42px;border-radius:50%;background:var(--panel);border:1px solid var(--cy);color:var(--cy);font-size:18px;cursor:pointer;display:none}
.hint{font-size:10.5px;color:var(--sub)}
.scrollx{overflow-x:auto;-webkit-overflow-scrolling:touch}
.scrollx::after{content:"→ スクロール";font-size:9px;color:var(--sub)}
.onehand .kpis{margin-top:32vh}
.cards{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.card{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:8px 14px;cursor:pointer;font-size:13px;min-height:38px}
.card.on{border-color:var(--cy);color:var(--cy)}
.card .x{color:var(--sub);font-weight:700;padding:0 2px}
.gauge{display:inline-block;vertical-align:middle}
@media print{body{background:#fff;color:#000;padding:8px}.tabbar,.totop,.toprow,.hdr .hsub{display:none}.pane{display:block!important}.sec{border-color:#bbb;break-inside:avoid;background:#fff}:root{--text:#000;--sub:#444;--panel:#fff;--panel2:#f4f4f4;--line:#ccc;--cy:#005a8c;--mg:#90135c}}
html:not(.light) .neon0 .sec{box-shadow:none}
html:not(.light) .neon2 .sec{box-shadow:0 0 22px rgba(25,227,255,.08)}
</style></head>
<body>
<div class="hdr" id="hdr">
  <div>
    <h1>📊 <span>解析ダッシュ <b>v2</b></span><span id="nick" class="hsub"></span></h1>
    <div class="hsub"><span id="lastupd">未取得</span> ・ <span id="fetchms"></span> ・ JST表示 <span id="tzwarn"></span> ・ <span id="cacheage"></span></div>
  </div>
  <div class="toprow">
    <button class="chip" id="autoBtn" onclick="toggleAuto()">⏱ 自動更新</button>
    <button class="chip" onclick="loadData(true)">🔄 更新</button>
  </div>
</div>
<div id="alerts"></div>
<div class="toc" id="toc"></div>
<div id="panes">
  <div class="pane on" id="p-sum"></div>
  <div class="pane" id="p-chart"></div>
  <div class="pane" id="p-list"></div>
  <div class="pane" id="p-ins"></div>
  <div class="pane" id="p-set"></div>
</div>
<button class="totop" id="totop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<div class="tabbar">
  <button class="on" data-tab="sum" onclick="tab('sum',this)"><span class="ic">🏠</span>サマリー</button>
  <button data-tab="chart" onclick="tab('chart',this)"><span class="ic">📈</span>グラフ</button>
  <button data-tab="list" onclick="tab('list',this)"><span class="ic">🏆</span>ランキング</button>
  <button data-tab="ins" onclick="tab('ins',this)"><span class="ic">💡</span>インサイト</button>
  <button data-tab="set" onclick="tab('set',this)"><span class="ic">⚙️</span>設定</button>
</div>
<script>
/* ===== 基盤: 設定・ユーティリティ・データ ===== */
'use strict';
var KNOWN_URL='https://script.google.com/macros/s/AKfycbwSF3v0hCeZb4KpynjfXITY-FGL7lOZSj7vdkIQU85WGswdpnAzaROXV_jyVFXHYn78/exec';
var D=null, PREV=null, FETCH_MS=0, FETCH_AT=0, AUTO=null, AUTO_LEFT=0, RETRY=0;
function $g(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function lsGet(k,d){try{var v=localStorage.getItem(k);return v==null?d:JSON.parse(v);}catch(e){try{localStorage.removeItem(k);}catch(e2){}return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
var CFG=lsGet('dash2cfg',{theme:'dark',fs:1,density:0,cols:2,neon:1,cbl:0,motion:1,nick:'',price:200,round:0,startTab:'sum',autoMin:0,widgets:{},pins:['todayVisits'],goals:{},notes:[],kmode:0,mavg:0,mask:0,onehand:0,kpicolor:''});
function saveCfg(){lsSet('dash2cfg',CFG);}
function fmtN(n,noK){n=Number(n)||0;var r=CFG.round?Number(n.toFixed(CFG.round)):Math.round(n);
 if(CFG.kmode&&!noK){if(Math.abs(r)>=1e6)return (r/1e6).toFixed(1)+'M';if(Math.abs(r)>=1e4)return (r/1e3).toFixed(1)+'K';}
 return r.toLocaleString('ja-JP');}
function pctS(a,b){if(!b)return a?'+∞%':'±0%';var p=(a-b)/b*100;return (p>0?'+':'')+p.toFixed(0)+'%';}
function arrowCls(a,b){return a>b?'up':a<b?'dn':'fl';}
function arrowMk(a,b){return a>b?'▲':a<b?'▼':'－';}
function jstDate(off){var d=new Date(Date.now()+9*36e5+(off||0)*864e5);return d.toISOString().slice(0,10);}
function wd(dateStr){return new Date(dateStr+'T00:00:00+09:00').getDay();}
var WDN=['日','月','火','水','木','金','土'];
var NAMEMAP={map:'マップ',pred:'プレデター',srv:'サーバー',find:'プレイヤー検索',diag:'診断ハブ',shop:'ショップ',update:'アップデート',recruit:'募集テンプレ',battle:'対決バトル',gear:'デバイス選び',sh:'立ち回り診断',ng:'使うな診断',ub:'使うべきキャラ',ts:'強さ診断',rl:'ルーレット',lk:'今日のラッキー',du:'デュオ相性',tr:'地雷度',ga:'ゲーマー年齢',pt:'パーティ役割',mt:'煽り耐性',sp:'ソロパ診断',iq:'立ち回りIQ',mg:'味方ガチャ',nl:'本日の野良運',bg:'民度診断',pg:'罰ゲーム'};
var EMOMAP={map:'🗺️',pred:'👑',srv:'📡',find:'🔍',diag:'🧪',shop:'🛒',update:'🆕',recruit:'📋',battle:'⚔️',gear:'🧰',sh:'🎯',ng:'🚫',ub:'🧭',ts:'🔥',rl:'🎰',lk:'🍀',du:'🤝',tr:'💣',ga:'🎂',pt:'🎭',mt:'🛡️',sp:'🦁',iq:'🧠',mg:'🎲',nl:'🔮',bg:'🤬',pg:'💀'};
function nName(k){return NAMEMAP[k]||k;}
function nEmo(k){return EMOMAP[k]||'▫️';}
function toast(t){var e=document.createElement('div');e.className='toast';e.textContent=t;document.body.appendChild(e);setTimeout(function(){e.remove();},2200);}
function copyTxt(t){try{navigator.clipboard.writeText(t).then(function(){toast('コピーした');});}catch(e){toast('コピー失敗');}}
function vib(){try{if(navigator.vibrate)navigator.vibrate(12);}catch(e){}}
/* trend 派生 */
function deriv(d){
 var raw=(d.trend||[]).map(function(x){return {date:String(x.date||'').slice(0,10),v:Number(x.visits)||0,nu:Number(x.nu)||0};});
 // 日付がISO/重複でもOKにする：正しいyyyy-MM-ddが揃ってなければ「末尾=今日」として連番付与
 var uniqDates={};raw.forEach(function(r){if(/^\d{4}-\d{2}-\d{2}$/.test(r.date))uniqDates[r.date]=1;});
 var needFix=(Object.keys(uniqDates).length<raw.length);
 var tr=raw.map(function(r,i){
   var dt=r.date;
   if(needFix){var dd=new Date(Date.now()+9*36e5-(raw.length-1-i)*864e5);dt=dd.toISOString().slice(0,10);}
   return {date:dt,v:r.v,nu:r.nu,ret:Math.max(0,r.v-r.nu)};
 });
 var vs=tr.map(function(x){return x.v;});
 var sum=vs.reduce(function(a,b){return a+b;},0);
 var avg=tr.length?sum/tr.length:0;
 var sorted=vs.slice().sort(function(a,b){return a-b;});
 var med=sorted.length?(sorted.length%2?sorted[(sorted.length-1)/2]:(sorted[sorted.length/2-1]+sorted[sorted.length/2])/2):0;
 var sd=tr.length?Math.sqrt(vs.reduce(function(a,b){return a+(b-avg)*(b-avg);},0)/tr.length):0;
 var byWd=[[],[],[],[],[],[],[]];tr.forEach(function(x){byWd[wd(x.date)].push(x.v);});
 var wdAvg=byWd.map(function(a){return a.length?a.reduce(function(p,c){return p+c;},0)/a.length:0;});
 var best=wdAvg.indexOf(Math.max.apply(null,wdAvg));
 var worst=0,wmin=Infinity;wdAvg.forEach(function(v,i){if(byWd[i].length&&v<wmin){wmin=v;worst=i;}});
 var streak=0;for(var i=tr.length-1;i>=0;i--){if(tr[i].v>0)streak++;else break;}
 var mav3=tr.map(function(x,i){var s=tr.slice(Math.max(0,i-2),i+1);return s.reduce(function(a,b){return a+b.v;},0)/s.length;});
 var mav7=tr.map(function(x,i){var s=tr.slice(Math.max(0,i-6),i+1);return s.reduce(function(a,b){return a+b.v;},0)/s.length;});
 var cum=[],c=0;tr.forEach(function(x){c+=x.v;cum.push(c);});
 var max=Math.max.apply(null,vs.concat([0])),maxI=vs.indexOf(max);
 // 今日終了予測
 var hh=new Date(Date.now()+9*36e5).getUTCHours()+new Date().getMinutes()/60;
 var frac=Math.max(.08,hh/24);
 var k=d.kpi||{};
 var pred=Math.round((k.todayVisits||0)/frac);
 var wk=tr.slice(-7).reduce(function(a,b){return a+b.v;},0), wkPrev=tr.slice(-14,-7).reduce(function(a,b){return a+b.v;},0);
 var growth=wkPrev?((wk-wkPrev)/wkPrev*100):0;
 return {tr:tr,sum:sum,avg:avg,med:med,sd:sd,wdAvg:wdAvg,best:best,worst:worst,streak:streak,mav3:mav3,mav7:mav7,cum:cum,max:max,maxI:maxI,pred:pred,wk:wk,wkPrev:wkPrev,growth:growth};
}
/* スナップショット履歴 */
function snaps(){return lsGet('dash2snaps',[]);}
function pushSnap(d){var a=snaps();a.push({t:Date.now(),k:d.kpi,top:{views:(d.views||[]).slice(0,8),diags:(d.diags||[]).slice(0,8),prods:(d.products||[]).slice(0,8)}});if(a.length>40)a=a.slice(-40);lsSet('dash2snaps',a);}
function prevSnap(){var a=snaps();return a.length>1?a[a.length-2]:null;}
function rankChange(list,key){var p=prevSnap();if(!p||!p.top||!p.top[key])return {};var m={};p.top[key].forEach(function(x,i){m[x.k]=i;});var out={};(list||[]).forEach(function(x,i){if(m[x.k]===undefined)out[x.k]='new';else if(m[x.k]>i)out[x.k]='up';else if(m[x.k]<i)out[x.k]='dn';});return out;}
/* ===== SVGチャート部品 ===== */
function svgO(w,h){return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" style="display:block">';}
function lineChart(tr,opts){
 opts=opts||{};var W=640,H=200,P=34;var n=tr.length;if(!n)return '<div class="hint">データなし</div>';
 var vals=tr.map(function(x){return x.v;});var mavg=opts.mavg||null;
 var max=Math.max.apply(null,vals.concat(mavg||[1]))||1;
 function X(i){return P+(W-P*2)*(n===1?0.5:i/(n-1));}
 function Y(v){return H-26-(H-52)*(v/max);}
 var s=svgO(W,H);
 for(var g=0;g<=3;g++){var gy=Y(max*g/3);s+='<line x1="'+P+'" y1="'+gy+'" x2="'+(W-P)+'" y2="'+gy+'" stroke="var(--line)" stroke-width="1"/><text x="'+(P-5)+'" y="'+(gy+4)+'" font-size="9" fill="var(--sub)" text-anchor="end">'+Math.round(max*g/3)+'</text>';}
 var avg=vals.reduce(function(a,b){return a+b;},0)/n;
